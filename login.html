<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Gaweshanayen Obbata</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff4e8a,#845ec2);
    overflow:hidden;
}

.box{
    width:330px;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:20px;
    text-align:center;
    color:white;
    animation:fade 1s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h2{
    margin-bottom:10px;
}

p{
    font-size:14px;
    opacity:.8;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    border-radius:30px;
    margin:10px 0;
    background:rgba(255,255,255,0.15);
    color:white;
}

input::placeholder{
    color:#ddd;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:30px;
    background:#00c9a7;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.03);
}

.status{
    margin-top:15px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="box">
    <h2>Login</h2>
    <p>Login using Username or Gmail</p>

    <input type="text" id="user" placeholder="Username or Gmail">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="status" id="status"></div>
</div>

<script>

const SHEET_API = "https://opensheet.elk.sh/1DscsyGIfN_gmCbYv2IkjdzsxF5j_ok6uSZEDGvGWOI4/ABC";

async function login(){

    let user = document.getElementById("user").value.trim();
    let password = document.getElementById("password").value.trim();

    const status = document.getElementById("status");

    if(user === "" || password === ""){
        status.innerText = "Please fill all fields";
        return;
    }

    status.innerText = "Checking...";

    try{

        const response = await fetch(SHEET_API);
        const data = await response.json();

        let found = false;

        data.forEach(account => {

            const username = account.Username;
            const gmail = account["Gmail "];
            const pass = account.PasswordHash;

            if(
                (user === username || user === gmail)
                &&
                password === pass
            ){
                found = true;

                localStorage.setItem("username", username);
                localStorage.setItem("name", account.name);
                localStorage.setItem("gmail", gmail);
                localStorage.setItem("balance", account.Balance);
                localStorage.setItem("refid", account.RefID);

                window.location.href = "home.html";
            }

        });

        if(!found){
            status.innerText = "Invalid login details";
        }

    }catch(err){
        console.log(err);
        status.innerText = "Connection error";
    }

}

</script>

</body>
</html>
